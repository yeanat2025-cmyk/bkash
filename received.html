<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Received - Success</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f5f5f5; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background-color: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { text-align: center; padding: 40px 20px 20px; }
        .success-msg { color: #e2136e; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .success-msg span { color: #28a745; }
        .circle-check { width: 28px; height: 28px; border: 2px solid #28a745; border-radius: 50%; color: #28a745; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; }

        /* User Info */
        .user-info { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; margin-top: 10px; }
        .avatar { width: 50px; height: 50px; background-color: #79c9d4; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; color: white; font-weight: bold; font-size: 20px; }
        .sender-details div { font-size: 16px; color: #333; font-weight: 500; }
        
        /* Data Grid */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #f0f0f0; }
        .grid-item { padding: 15px 20px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }
        .label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .value { font-size: 14px; color: #333; font-weight: bold; }

        /* Share & Reward */
        .share-section { padding: 20px; text-align: center; }
        .share-btn { border: 1.5px solid #e2136e; color: #e2136e; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .reward-box { text-align: center; padding: 30px 10px; flex-grow: 1; }
        .star { background: #e2136e; color: white; width: 35px; height: 35px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }

        /* Footer */
        .footer-nav { background: #e2136e; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="success-msg">
            আপনার সেন্ড মানি<span>সফল হয়েছে</span>
            <div class="circle-check">✓</div>
        </div>
    </div>

    <div class="user-info">
        <div class="avatar" id="res-avatar">?</div>
        <div class="sender-details">
            <div id="res-name">Loading...</div>
            <div id="res-number">01XXXXXXXXX</div>
        </div>
    </div>

    <div class="info-grid">
        <div class="grid-item">
            <div class="label">সময়</div>
            <div id="res-time" class="value">--:-- --/--/--</div>
        </div>
        <div class="grid-item" style="border-right: none;">
            <div class="label">ট্রানজেকশন আইডি</div>
            <div id="res-trxid" class="value">--------</div>
        </div>
        <div class="grid-item">
            <div class="label">সর্বমোট</div>
            <div id="res-amount" class="value">৳ 0.00</div>
        </div>
        <div class="grid-item" style="border-right: none;">
            <div class="label">নতুন ব্যালেন্স</div>
            <div id="res-balance" class="value">৳ 0.00</div>
        </div>
    </div>

    <div class="share-section"><div class="share-btn">➥ শেয়ার</div></div>

    <div class="reward-box">
        <div class="star">★</div>
        <p style="font-size: 13px; color: #666;">আপনি অর্জন করেছেন</p>
        <p style="font-weight: bold;">বিকাশ রিওয়ার্ড পয়েন্ট</p>
    </div>

    <div class="footer-nav" onclick="window.location.href='index.html'">
        পরবর্তী <span>➔</span>
    </div>
</div>

<script>
    // LocalStorage থেকে ডেটা পড়া এবং বসানো
    window.onload = function() {
        const name = localStorage.getItem("send_name") || "অজানা ইউজার";
        const number = localStorage.getItem("send_num") || "01XXXXXXXXX";
        const amount = localStorage.getItem("send_amount") || "0.00";
        const time = localStorage.getItem("trx_time") || "এখনই";
        const trxid = localStorage.getItem("trx_id") || "N/A";
        const balance = localStorage.getItem("new_balance") || "0.00";

        document.getElementById('res-name').innerText = name;
        document.getElementById('res-number').innerText = number;
        document.getElementById('res-amount').innerText = "৳ " + amount;
        document.getElementById('res-time').innerText = time;
        document.getElementById('res-trxid').innerText = trxid;
        document.getElementById('res-balance').innerText = "৳ " + balance;
        document.getElementById('res-avatar').innerText = name.charAt(0).toUpperCase();
    }
</script>

</body>
</html>
